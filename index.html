<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Global Shopper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1A0B36" />
  <!-- Human visitors who type the bare apex get bounced to www where the
       full Express app lives. Three layers so nobody falls through:
       1) Server-friendly canonical for crawlers
       2) Instant meta-refresh for browsers
       3) JS redirect with the original path/query preserved -->
  <link rel="canonical" href="https://www.globalshopper.in/" />
  <meta http-equiv="refresh" content="0; url=https://www.globalshopper.in/" />
  <script>
    (function () {
      var target = 'https://www.globalshopper.in' + (location.pathname || '/') + (location.search || '') + (location.hash || '');
      location.replace(target);
    })();
  </script>
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #1A0B36; color: #fff; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    .box { text-align: center; padding: 24px; }
    .box h1 { margin: 0 0 8px 0; font-size: 22px; font-weight: 700; }
    .box p { margin: 0; opacity: 0.75; font-size: 14px; }
    a { color: #C9A8FF; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Global Shopper</h1>
    <p>Redirecting to <a href="https://www.globalshopper.in/">www.globalshopper.in</a>…</p>
  </div>
</body>
</html>
